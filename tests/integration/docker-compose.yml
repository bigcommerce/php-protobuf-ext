services:
  php:
    build:
      context: ../..                       # repo root, so the Dockerfile can COPY src/
      dockerfile: tests/integration/docker/php/Dockerfile
    # Poison freed heap memory so the keep0 use-after-free check is deterministic:
    # a freed-then-reused descriptor pool reads garbage and fails instead of
    # silently succeeding on intact stale memory.
    environment:
      MALLOC_PERTURB_: "165"
      USE_ZEND_ALLOC: "0"
    volumes:
      - ./releases:/var/www/releases
  web:
    image: nginx:alpine
    ports:
      - "8880:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
