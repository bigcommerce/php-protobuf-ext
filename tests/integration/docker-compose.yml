services:
  php:
    build:
      context: ../..                       # repo root, so the Dockerfile can COPY src/
      dockerfile: tests/integration/docker/php/Dockerfile
    volumes:
      - ./releases:/var/www/releases
  web:
    image: nginx:alpine
    ports:
      - "8880:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
