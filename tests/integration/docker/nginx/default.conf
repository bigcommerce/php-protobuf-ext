# Route each request to a release's document root based on the x-release header.
# Unknown / missing release -> 400. Routing to a release's own public/ is what
# makes that release's .user.ini (the descriptor_pool_key) apply.
map $http_x_release $release_root {
    default "";
    v1-foo  /var/www/releases/v1-foo;
    v1-bar  /var/www/releases/v1-bar;
    v2      /var/www/releases/v2;
    compat  /var/www/releases/compat;
    keep0   /var/www/releases/keep0;
}

server {
    listen 80;
    server_name localhost;

    location / {
        if ($release_root = "") { return 400 "unknown or missing x-release\n"; }

        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $release_root/public/index.php;
        fastcgi_param DOCUMENT_ROOT   $release_root/public;
        include fastcgi_params;
    }
}
